<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tablero de investigación</title>

    <link rel="stylesheet" href="estilos.css" />

    <style>
      .lado-texto {
        display: flex;
        flex-direction: column;
        max-height: 80vh;
        flex: 1;
        overflow: hidden;
      }

      #textoDetective {
        white-space: normal;
        line-height: 1.7;
        color: #f0ead6;
        overflow-y: auto;
        padding-right: 15px;
        scrollbar-width: thin;
        scrollbar-color: var(--pergamino) transparent;
      }

      #textoDetective::-webkit-scrollbar {
        width: 6px;
      }

      #textoDetective::-webkit-scrollbar-thumb {
        background-color: var(--pergamino, #e8d9b8);
        border-radius: 10px;
      }

      .lado-texto h2 {
        color: var(--pergamino, #e8d9b8);
        margin-bottom: 15px;
      }

      .botones-overlay {
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin-top: 20px;
        align-items: center;
      }

      .contenido-evidencia {
        display: flex;
        gap: 20px;
        max-height: 85vh;
      }

      .btn-esquina {
        position: relative;
        padding: 12px 25px;
        min-width: 140px;
        background: linear-gradient(
          to bottom,
          var(--boton-claro),
          var(--boton-medio)
        );
        border: 3px solid var(--boton-borde);
        border-radius: 10px;
        color: var(--texto-acento);
        font-weight: bold;
        font-family: Georgia, "Times New Roman", serif;
        box-shadow: 3px 3px 0 var(--boton-sombra);
        cursor: pointer;
        transition: 0.3s;
      }

      .btn-esquina:hover {
        border: 3px solid var(--boton-borde-hover);
        box-shadow:
          0 0 8px var(--brillo-calido-fuerte),
          0 0 18px var(--brillo-calido-suave),
          3px 3px 0 var(--boton-sombra);
      }

      .tablero-escena {
        position: relative;
      }

      .sin-scroll {
        overflow: hidden;
      }

      #imagenOverlay {
        width: 100%;
        max-width: 720px;
        max-height: 650px;
        object-fit: cover;
        border-radius: 10px;
        border: 2px solid var(--pergamino);
      }

      #textoAsistente {
        color: var(--pergamino);
        font-style: italic;
        line-height: 1.6;
      }
    </style>
  </head>

  <body>
    <div class="fondo-global-juego"></div>

    <main class="escena-principal">
      <section class="contenedor-juego">
        <header class="barra-superior visible-ui">
          <button class="btn btn-outline-light btn-sm" onclick="window.location.href = 'index.html'">
            Volver atrás
          </button>

          <div class="grupo-botones-derecha">
            <button class="btn-esquina" onclick="window.location.href='SobreP&C.html'">Sobre los point & click</button>
            <button class="btn-esquina" onclick="window.location.href='Galeria.html'">Galería</button>
            <button class="btn-esquina" onclick="window.location.href='Informe.html'">Informe</button>
            <button class="btn-esquina" onclick="window.location.href='Contactenos.html'">Contáctenos</button>
          </div>
        </header>

        <section class="visor-central">
          <section class="tablero-escena" aria-label="Tablero de investigación">
            <!-- Wrapper relativo a la imagen real para que las zonas siempre se anclen correctamente -->
            <div class="tablero-wrapper">
              <img src="Multimedia/EscenarioTablero.png" class="tablero-img" alt="Tablero de investigación" draggable="false" />

              <div class="zona-mapa" style="top: 12%; left: 7%;  width: 11%; height: 20%;" data-id="sospechoso_a"></div>
              <div class="zona-mapa" style="top: 22%; left: 22%; width: 10%; height: 20%;" data-id="victima"></div>
              <div class="zona-mapa" style="top: 42%; left: 29%; width: 11%; height: 22%;" data-id="testigo"></div>
              <div class="zona-mapa" style="top: 18%; left: 54%; width: 11%; height: 22%;" data-id="comisario"></div>
              <div class="zona-mapa" style="top: 55%; left: 37%; width: 10%; height: 22%;" data-id="prensa"></div>
            </div>
          </section>
        </section>

        <footer class="barra-inferior-juego visible-ui">
          <div class="panel-mensaje-juego">
            <p id="mensajeJuego">Inspecciona los documentos del tablero.</p>
          </div>
        </footer>
      </section>
    </main>

    <div id="ayuda" class="overlay-ayuda">
      <div class="contenedor-tutorial">
        <section class="pagina pagina-evidencia">
          <section class="panel-central sin-papiro">

            <div class="contenido-evidencia">

              <div class="lado-imagen">
                <img id="imagenOverlay" class="img-fluid" />

                <div class="perfil-cita">
                  <blockquote id="textoAsistente"></blockquote>
                </div>

                <div class="botones-overlay">
                  <button id="btnCerrar" class="btn-esquina">Cerrar informe</button>
                  <button class="btn-esquina" onclick="window.location.href='Oficina.html'">
                    Volver a la oficina
                  </button>
                </div>
              </div>

              <div class="lado-texto">
                <h2 id="tituloDetalle">Notas del detective</h2>
                <p id="textoDetective">Observación pendiente.</p>
              </div>

            </div>

          </section>
        </section>
      </div>
    </div>

    <script>
      const overlay = document.getElementById("ayuda");
      const imagenOverlay = document.getElementById("imagenOverlay");
      const textoDetective = document.getElementById("textoDetective");
      const textoAsistente = document.getElementById("textoAsistente");
      const tituloDetalle = document.getElementById("tituloDetalle");

      const titulos = {
        dragon: "Entidad Alfa: Dragón de Incineración",
        gusano_arena: "Entidad Subterránea Colmena: Gusano de Arena",
        cervudo: "Entidad de Distorsión Forestal: Cervudo",
        humanoide_hongos: "Entidad Fúngica de Mimetismo Humanoide",
        ciervo_runico: "Entidad Anómala Rúnica: Ciervo Rúnico"
      };

      const narraciones = {
        dragon: "Registro de subjugación — Dragón/n/Unidad de alto riesgo térmico...",
        gusano_arena: "Registro de subjugación — Gusano de arena/n/Colonia subterránea...",
        cervudo: "Registro de subjugación — Cervudo/n/Distorsión perceptiva...",
        humanoide_hongos: "Registro de subjugación — Humanoide fúngico/n/Infección cognitiva...",
        ciervo_runico: "Registro de subjugación — Ciervo rúnico/n/Anomalía dimensional..."
      };

      const comentarios = {
        dragon: [
          "Eso no es fauna local, es una unidad de combate natural.",
          "Algo lo está dirigiendo o ya aprendió a cazar."
        ],
        gusano_arena: [
          "El suelo ya no es confiable.",
          "No es uno… es una red viva."
        ],
        cervudo: [
          "El entorno cambia cuando aparece.",
          "La percepción falla cerca de él."
        ],
        humanoide_hongos: [
          "No es transformación, es sustitución.",
          "Ya no es humano en sentido funcional."
        ],
        ciervo_runico: [
          "No es criatura.",
          "Es un evento con forma."
        ]
      };

      const imagenes = {
        dragon: "Multimedia/encargo1.jpg",
        gusano_arena: "Multimedia/encargo2.jpg",
        cervudo: "Multimedia/encargo3.jpg",
        humanoide_hongos: "Multimedia/encargo4.jpg",
        ciervo_runico: "Multimedia/encargo5.jpg"
      };

      document.querySelectorAll(".zona-mapa").forEach(zona => {
        const id = zona.dataset.id;

        zona.addEventListener("click", () => {
          tituloDetalle.textContent = titulos[id];
          textoDetective.innerHTML = (narraciones[id] || "").replace(/\/n\//g, "<br><br>");
          textoAsistente.innerHTML = (comentarios[id] || []).map(c => "• " + c).join("<br>");
          imagenOverlay.src = imagenes[id];

          overlay.classList.add("activo");
          document.body.classList.add("sin-scroll");
        });
      });

      document.getElementById("btnCerrar").addEventListener("click", () => {
        overlay.classList.remove("activo");
        document.body.classList.remove("sin-scroll");
      });
    </script>
  </body>
</html>

<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tablero de investigación</title>
    <link rel="stylesheet" href="estilos.css" />

    <style>
      /* --- ESTILOS DEL OVERLAY (Copiados de Galería) --- */
      .lado-texto {
        display: flex;
        flex-direction: column;
        max-height: 80vh; 
        flex: 1;
        overflow: hidden;
      }

      #textoDetective {
        white-space: normal;
        line-height: 1.7;
        color: #f0ead6;
        overflow-y: auto;
        padding-right: 15px;
        scrollbar-width: thin;
        scrollbar-color: var(--pergamino) transparent;
      }

      #textoDetective::-webkit-scrollbar { width: 6px; }
      #textoDetective::-webkit-scrollbar-thumb {
        background-color: var(--pergamino, #e8d9b8);
        border-radius: 10px;
      }

      .lado-texto h2 {
        color: var(--pergamino, #e8d9b8);
        margin-bottom: 15px;
      }

      .botones-overlay {
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin-top: 20px;
        align-items: center;
      }

      .contenido-evidencia {
        display: flex;
        gap: 20px;
        max-height: 85vh;
      }

      /* --- BOTONES --- */
      .btn-esquina {
        position: relative;
        padding: 12px 25px;
        min-width: 140px;
        background: linear-gradient(to bottom, var(--boton-claro), var(--boton-medio));
        border: 3px solid var(--boton-borde);
        border-radius: 10px;
        color: var(--texto-acento);
        font-weight: bold;
        font-family: Georgia, "Times New Roman", serif;
        box-shadow: 3px 3px 0 var(--boton-sombra);
        cursor: pointer;
        transition: 0.3s;
      }

      .btn-esquina:hover {
        border: 3px solid var(--boton-borde-hover);
        background: linear-gradient(to bottom, var(--boton-hover-claro), var(--boton-hover-medio));
        box-shadow: 0 0 8px var(--brillo-calido-fuerte), 0 0 18px var(--brillo-calido-suave), 3px 3px 0 var(--boton-sombra);
      }

      /* --- MAPA Y ZONAS --- */
      .tablero-escena {
        position: relative;
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* Wrapper que abraza exactamente la imagen — las zonas se posicionan sobre él */
      .tablero-wrapper {
        position: relative;
        display: inline-block;  /* Se encoge al tamaño real de la imagen */
        line-height: 0;         /* Elimina espacio fantasma bajo el img */
        max-width: 100%;
        max-height: 100%;
      }

      .tablero-img {
        display: block;
        max-width: 100%;
        max-height: 100%;
        width: auto;
        height: auto;
        object-fit: contain;
        user-select: none;
        /* limita la altura al visor para no desbordar */
        max-height: calc(100vh - 180px);
      }

      /* Las zonas heredan position:absolute del CSS global (.zona-mapa) */
      /* pero ahora su padre es .tablero-wrapper, no el visor entero     */
      .tablero-wrapper .zona-mapa {
        position: absolute;
        cursor: pointer;
        border-radius: 6px;
        transition: background 0.25s, box-shadow 0.25s;
      }

      .tablero-wrapper .zona-mapa:hover {
        background: rgba(255, 248, 220, 0.18);
        box-shadow: 0 0 20px rgba(255, 230, 180, 0.5);
      }

      .sin-scroll { overflow: hidden; }
    </style>
  </head>

  <body>
    <div class="fondo-global-juego"></div>

    <main class="escena-principal">
      <section class="contenedor-juego">
        <header class="barra-superior visible-ui">
          <button type="button" class="btn-esquina" onclick="sessionStorage.setItem('desdeEscena', 'true'); window.location.href = 'Oficina.html';">
            Volver atrás
          </button>
          <div class="grupo-botones-derecha">
            <button class="btn-esquina" onclick="window.location.href = 'SobreP&C.html'">Sobre los point & click</button>
            <button class="btn-esquina" onclick="window.location.href = 'Galeria.html'">Galería</button>
            <button class="btn-esquina" onclick="window.location.href = 'Informe.html'">Informe</button>
          </div>
        </header>

        <section class="visor-central">
          <section class="tablero-escena" aria-label="Tablero de investigación">
            <!-- Wrapper relativo a la imagen real para que las zonas siempre se anclen correctamente -->
            <div class="tablero-wrapper">
              <img src="Multimedia/EscenarioTablero.png" class="tablero-img" alt="Tablero de investigación" draggable="false" />

              <div class="zona-mapa" style="top: 12%; left: 7%;  width: 11%; height: 20%;" data-id="sospechoso_a"></div>
              <div class="zona-mapa" style="top: 22%; left: 22%; width: 10%; height: 20%;" data-id="victima"></div>
              <div class="zona-mapa" style="top: 42%; left: 29%; width: 11%; height: 22%;" data-id="testigo"></div>
              <div class="zona-mapa" style="top: 18%; left: 54%; width: 11%; height: 22%;" data-id="comisario"></div>
              <div class="zona-mapa" style="top: 55%; left: 37%; width: 10%; height: 22%;" data-id="prensa"></div>
            </div>
          </section>
        </section>

        <footer class="barra-inferior-juego visible-ui">
          <div class="panel-mensaje-juego">
            <p id="mensajeJuego">Inspecciona los documentos del tablero.</p>
          </div>
        </footer>
      </section>
    </main>

    <div id="ayuda" class="overlay-ayuda">
      <div class="contenedor-tutorial">
        <section class="pagina pagina-evidencia">
          <section class="panel-central sin-papiro">
            <div class="contenido-evidencia">
              <div class="lado-imagen">
                <img id="imagenOverlay" class="img-fluid" style="max-height: 400px; border-radius: 10px; border: 2px solid var(--pergamino);"/>
                
                <div class="perfil-cita">
                  <blockquote id="textoAsistente" style="color: var(--pergamino)">...</blockquote>
                </div>

                <div class="botones-overlay">
                  <button id="btnCerrar" class="btn-esquina">Cerrar informe</button>
                  <button class="btn-esquina" onclick="window.location.href = 'Oficina.html';">Volver a la oficina</button>
                </div>
              </div>

              <div class="lado-texto">
                <h2 id="tituloDetalle">Notas del detective</h2>
                <p id="textoDetective">Observación pendiente.</p>
              </div>
            </div>
          </section>
        </section>
      </div>
    </div>

    <script>
      const mensajeJuego = document.getElementById("mensajeJuego");
      const overlay = document.getElementById("ayuda");
      const imagenOverlay = document.getElementById("imagenOverlay");
      const textoDetective = document.getElementById("textoDetective");
      const textoAsistente = document.getElementById("textoAsistente");
      const tituloDetalle = document.getElementById("tituloDetalle");

      // DATOS DE LOS CARTELES (Mismo formato que Galería)
      const narraciones = {
        "sospechoso_a": "Registro de sospechoso — Sujeto A/n/Individuo visto en las inmediaciones de Allashar. Su perfil no encaja con los residentes locales; la ropa presenta un desgaste incompatible con el clima de la región./n/Se le asocia con la desaparición de registros en la biblioteca central. Es meticuloso, no deja rastros biológicos, solo vacíos en las estanterías.",
        "victima": "Expediente de la Víctima/n/Causa de muerte: Interrupción sistémica. No hay trauma físico externo, pero la actividad neuronal se detuvo en seco./n/En su mano derecha sostenía un fragmento de carbón que, bajo análisis, resultó ser madera del bosque de Zelenograd convertida en diamante industrial.",
        "testigo": "Declaración del Testigo/n/— 'No era una persona, señor. Era como si el aire se doblara alrededor de algo'. El testigo presenta signos de estrés post-traumático y una leve pigmentación metálica en las retinas.",
        "comisario": "Informe del Comisario/n/La ciudad de Stormgarde no podrá sostener el bloqueo mucho más tiempo. Si los suministros de Hemin no llegan, el equilibrio social colapsará./n/Sospecho que alguien dentro del consejo está filtrando nuestras rutas de patrulla.",
        "prensa": "Recorte de Prensa/n/Titular: 'EL SOL SE APAGA EN EL ESTE'. Los avistamientos de la entidad denominada 'El Cérvido' han aumentado un 40% este mes. El gobierno pide calma mientras evacuan los sectores periféricos."
      };

      const comentarios = {
        "sospechoso_a": "Mire esa cara, jefe… tiene 'culpable' escrito en la frente con letras grandes.",
        "victima": "Pobre tipo. Dicen que se quedó tieso como una estatua de repente.",
        "testigo": "A este pobre le dio un buen susto. Yo que él, no volvería a mirar por la ventana de noche.",
        "comisario": "El viejo comisario está nervioso. Sabe que si Stormgarde cae, nosotros vamos detrás.",
        "prensa": "La prensa siempre exagerando… aunque esta vez, me da que se quedan cortos."
      };

      const titulos = {
        "sospechoso_a": "Perfil: Sospechoso A",
        "victima": "Expediente #402",
        "testigo": "Archivo de Testimonio",
        "comisario": "Reporte Confidencial",
        "prensa": "Prensa Local"
      };

      // CONFIGURACIÓN DE ZONAS
      document.querySelectorAll(".zona-mapa").forEach(zona => {
        const id = zona.dataset.id;

        zona.addEventListener("mouseenter", () => {
          mensajeJuego.textContent = "Examinar: " + titulos[id];
        });

        zona.addEventListener("mouseleave", () => {
          mensajeJuego.textContent = "Inspecciona los documentos del tablero.";
        });

        zona.addEventListener("click", () => {
          // Rellenar Overlay
          tituloDetalle.textContent = titulos[id];
          textoDetective.innerHTML = (narraciones[id] || "Sin notas.").replace(/\/n\//g, "<br><br>");
          textoAsistente.textContent = comentarios[id] || "...";
          
          // Imagen (Usamos una por defecto o específica si tienes)
          imagenOverlay.src = `Multimedia/Evidencia_${id}.png`; 
          
          // Mostrar
          overlay.classList.add("activo");
          document.body.classList.add("sin-scroll");
          textoDetective.scrollTop = 0;
        });
      });

      // CERRAR
      document.getElementById("btnCerrar").addEventListener("click", () => {
        overlay.classList.remove("activo");
        document.body.classList.remove("sin-scroll");
      });
    </script>
  </body>
</html>

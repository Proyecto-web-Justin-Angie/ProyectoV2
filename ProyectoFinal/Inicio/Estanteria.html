    <style>
      .overlay-ayuda {
        display: none;
        align-items: center;
        justify-content: center;
        position: fixed;
        inset: 0;
        background: var(--overlay-ayuda);
        backdrop-filter: blur(8px);
        z-index: 10000;
      }

      .overlay-ayuda.activo {
        display: flex;
      }

      body.sin-scroll {
        overflow: hidden;
      }

      .contenedor-tutorial {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }

      .libro-abierto {
        width: 95%;
        max-width: 1000px;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .contenido-libro-layout {
        width: 100%;
        display: grid;
        grid-template-columns: 1fr 1fr;
        min-height: 550px;

        background: linear-gradient(
          to right,
          var(--pergamino-claro) 5%,
          var(--pergamino) 10%,
          var(--pergamino) 90%,
          var(--pergamino-claro) 100%

        border-radius: 5px 20px 20px 5px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
        position: relative;
        border: 2px solid var(--borde);
      }

      .contenido-libro-layout::before {
        content: "";
        position: absolute;
        left: 50%;
        top: 0;
        bottom: 0;
        width: 40px;
        transform: translateX(-50%);
        background: linear-gradient(
          to right,
          rgba(0, 0, 0, 0.1),
          rgba(0, 0, 0, 0.2) 50%,
          rgba(0, 0, 0, 0.1)
        );
        z-index: 2;
      }

      .pagina-izquierda,
      .pagina-derecha {
        padding: 40px 50px;
        overflow-y: auto;
        max-height: 500px;
        font-family: Georgia, serif;
        line-height: 1.6;
        color: var(--tinta);
        z-index: 3;
      }

      #indicador {
        color: var(--pergamino);
        font-family: monospace;
        font-size: 1.2rem;
        font-weight: bold;
        text-shadow: 1px 1px 2px black;
      }
    </style>

    <script>
      /* =========================
         LIBROS REALES
      ========================== */
      const librosLore = [
// --- FAMILIA IMPERIAL ---
        {
          titulo: "Archivo Imperial: Anatomía de una Dinastía",
          paginas: [
            {
              izq: `<h2>Estado del Registro</h2>
      <p>La información disponible sobre la familia imperial no proviene de archivos oficiales íntegros.</p>
      <p>Los documentos analizados presentan deterioro físico severo y fragmentación estructural.</p>
      <p>No obstante, la recurrencia de ciertos patrones permite reconstruir una línea coherente.</p>`,
              der: `<p>No se trata de historia registrada para preservar memoria.</p>
      <p>Se trata de historia que sobrevivió a intentos de eliminación.</p>
      <p>Esto introduce un sesgo: lo que permanece no es lo completo, sino lo resistente.</p>`,
            },
            {
              izq: `<h2>Naturaleza del Linaje</h2>
      <p>La familia imperial no puede ser definida únicamente como una estructura de gobierno.</p>
      <p>Opera como un sistema cerrado de reproducción de poder.</p>
      <p>El linaje no garantiza continuidad. Solo otorga acceso al conflicto.</p>`,
              der: `<p>La pertenencia a la familia no implica seguridad.</p>
      <p>Implica exposición constante a eliminación interna.</p>
      <p>No existe noción funcional de parentesco.</p>
      <p>La familia no protege. Filtra.</p>`,
            },
            {
              izq: `<h2>Sucesión</h2>
      <p>El acceso al trono no sigue un modelo hereditario estable.</p>
      <p>No hay primogenitura confiable ni designación clara.</p>
      <p>El proceso de sucesión es competitivo por diseño.</p>`,
              der: `<p>Los aspirantes son forzados a enfrentarse entre sí.</p>
      <p>Los mecanismos incluyen confrontación directa y eliminación indirecta.</p>
      <p>El resultado no selecciona al legítimo.</p>
      <p>Selecciona al superviviente.</p>`,
            },
            {
              izq: `<h2>Destino de los Derrotados</h2>
      <p>No existen registros de rituales funerarios para miembros caídos del linaje.</p>
      <p>Los cuerpos no son preservados ni reconocidos.</p>
      <p>La eliminación es total, tanto física como histórica.</p>`,
              der: `<p>Esto sugiere una intención deliberada de evitar cualquier forma de continuidad simbólica.</p>
      <p>El perdedor no solo muere.</p>
      <p>Es removido del sistema.</p>
      <p>Como si nunca hubiese formado parte de él.</p>`,
            },
            {
              izq: `<h2>Legitimidad</h2>
      <p>La familia imperial se autodefine como descendiente directa del sol.</p>
      <p>Esta afirmación no se presenta como metáfora.</p>
      <p>Funciona como base estructural de su autoridad.</p>`,
              der: `<p>No se han encontrado registros internos que cuestionen esta premisa.</p>
      <p>La legitimidad no se debate.</p>
      <p>Se asume como condición inicial.</p>
      <p>Esto elimina la necesidad de justificación externa.</p>`,
            },
            {
              izq: `<h2>Expansión</h2>
      <p>El imperio no mantiene un estado estático.</p>
      <p>Su crecimiento es constante y agresivo.</p>
      <p>La guerra no es un evento ocasional.</p>`,
              der: `<p>Es un mecanismo estructural de funcionamiento.</p>
      <p>La expansión territorial no responde a necesidad inmediata.</p>
      <p>Responde a una lógica interna de continuidad.</p>
      <p>Detenerse implicaría inestabilidad.</p>`,
            },
            {
              izq: `<h2>Emperador XXV</h2>
      <p>El ascenso del vigésimo quinto emperador sigue el patrón establecido: eliminación del predecesor.</p>
      <p>No obstante, su mandato introduce una variación observable.</p>`,
              der: `<p>La violencia no disminuye, pero cambia de forma.</p>
      <p>Deja de ser caótica.</p>
      <p>Se vuelve sistemática.</p>
      <p>Administrada.</p>`,
            },
            {
              izq: `<h2>Reorganización Interna</h2>
      <p>Bajo este mandato, los conflictos internos del linaje se reducen en frecuencia.</p>
      <p>No por ausencia de rivalidad, sino por control de sus manifestaciones.</p>`,
              der: `<p>Esto sugiere la implementación de mecanismos de regulación interna.</p>
      <p>La violencia no desaparece.</p>
      <p>Se optimiza.</p>
      <p>Se convierte en herramienta de estabilidad.</p>`,
            },
            {
              izq: `<h2>Interpretación</h2>
      <p>La familia imperial no busca eliminar la violencia de su estructura.</p>
      <p>La integra como componente esencial.</p>
      <p>El conflicto no es un fallo del sistema.</p>`,
              der: `<p>Es su método de selección.</p>
      <p>Su forma de adaptación.</p>
      <p>Su mecanismo de continuidad.</p>
      <p>La estabilidad se construye sobre eliminación controlada.</p>`,
            },
            {
              izq: `<h2>Nota Personal</h2>
      <p>La consistencia del modelo es lo más relevante.</p>
      <p>No hay desviaciones significativas a lo largo de generaciones.</p>
      <p>El sistema se perpetúa sin necesidad de reforma.</p>`,
              der: `<p>No se comporta como una estructura política convencional.</p>
      <p>Se asemeja más a un organismo.</p>
      <p>Uno que mantiene su forma mediante la eliminación constante de sus propias partes.</p>
      <p>No he determinado aún si esto lo hace más fuerte… o más inestable.</p>`,
            },
          ],
        },

        // --- DRAGONES ---
        {
          titulo: "Informe sobre los Dragones y su Retirada",
          paginas: [
            {
              izq: `<h2>Clasificación General</h2>
      <p>Los dragones no deben ser tratados como simples criaturas de gran escala.</p>
      <p>Su comportamiento evidencia patrones cognitivos avanzados, comparables a inteligencia estratégica.</p>
      <p>No actúan por impulso. Evalúan, deciden y ejecutan.</p>`,
              der: `<p>Esto los posiciona como entidades dominantes no solo por fuerza, sino por criterio.</p>
      <p>Históricamente, ocupan la cima de cualquier ecosistema en el que se establecen.</p>
      <p>No compiten. Desplazan.</p>
      <p>No coexisten. Imponen.</p>`,
            },
            {
              izq: `<h2>Estructura de Comportamiento</h2>
      <p>Los registros indican una organización no visible, pero consistente.</p>
      <p>Las rutas de vuelo no son aleatorias.</p>
      <p>No hay superposición innecesaria entre individuos.</p>`,
              der: `<p>Esto sugiere delimitación territorial o reconocimiento mutuo.</p>
      <p>No se han documentado conflictos prolongados entre dragones.</p>
      <p>La jerarquía, si existe, no se manifiesta mediante enfrentamiento directo.</p>
      <p>El orden parece implícito.</p>`,
            },
            {
              izq: `<h2>Capacidad de Intervención</h2>
      <p>El fuego de dragón no es una herramienta destructiva convencional.</p>
      <p>Las muestras indican descomposición estructural de la materia.</p>
      <p>El efecto no quema. Desintegra coherencia interna.</p>`,
              der: `<p>Esto los convierte en un mecanismo de alteración del entorno, no solo en depredadores.</p>
      <p>Un dragón no elimina obstáculos. Los invalida.</p>
      <p>No existe material conocido que resista este efecto de forma consistente.</p>`,
            },
            {
              izq: `<h2>Relación con el Territorio</h2>
      <p>Los dragones no abandonan zonas sin causa identificable.</p>
      <p>La permanencia territorial es uno de sus rasgos más constantes.</p>`,
              der: `<p>Cuando una región deja de ser habitable para un dragón, el cambio suele ser externo y significativo.</p>
      <p>No hay precedentes de retirada preventiva.</p>
      <p>Esto convierte cualquier abandono en un evento relevante.</p>`,
            },
            {
              izq: `<h2>La Retirada</h2>
      <p>Los registros actuales muestran una desviación sistemática de rutas.</p>
      <p>Las trayectorias evitan una región específica del continente.</p>
      <p>No se trata de reducción de actividad.</p>`,
              der: `<p>Es una exclusión deliberada.</p>
      <p>Ningún individuo cruza el límite identificado.</p>
      <p>La conducta es consistente entre todos los ejemplares observados.</p>
      <p>No hay excepciones documentadas.</p>`,
            },
            {
              izq: `<h2>Interpretación</h2>
      <p>La retirada no puede explicarse como reacción instintiva.</p>
      <p>Implica evaluación previa del entorno.</p>`,
              der: `<p>Los dragones no evitan lo desconocido.</p>
      <p>Evitan lo comprendido como peligro.</p>
      <p>Esto sugiere exposición previa o transmisión de información entre individuos.</p>`,
            },
            {
              izq: `<h2>Implicaciones</h2>
      <p>Si una entidad capaz de dominar cualquier entorno decide no ingresar a una zona específica, el problema no es territorial.</p>
      <p>Es estructural.</p>`,
              der: `<p>No es que el bosque sea inaccesible.</p>
      <p>Es que no es compatible.</p>
      <p>El entorno podría operar bajo condiciones que invalidan incluso a los dragones.</p>`,
            },
            {
              izq: `<h2>Nota Personal</h2>
      <p>He observado un patrón adicional: los dragones no solo evitan el ingreso.</p>
      <p>Evitan incluso acercarse al límite.</p>`,
              der: `<p>Esto no es huida.</p>
      <p>Es contención.</p>
      <p>Como si comprendieran que cruzar no implica peligro inmediato…</p>
      <p>sino algo peor.</p>`,
            },
          ],
        },

        // --- FAFNIR ---
        {
          titulo: "Fafnir y el Evento Glacial",
          paginas: [
            {
              izq: `<h2>Registro del Evento</h2>
      <p>Los estratos geológicos analizados muestran un descenso abrupto de temperatura en múltiples regiones del continente.</p>
      <p>La transición no presenta fases intermedias. No corresponde a ciclos climáticos conocidos.</p>
      <p>La congelación ocurrió en un intervalo reducido, posiblemente simultáneo.</p>`,
              der: `<p>Flora y fauna fueron preservadas en estado funcional.</p>
      <p>No hay evidencia de migración previa ni adaptación progresiva.</p>
      <p>Esto descarta causas ambientales convencionales.</p>
      <p>El evento no fue natural en el sentido clásico.</p>`,
            },
            {
              izq: `<h2>Restos Encontrados</h2>
      <p>En el epicentro de las zonas afectadas se han identificado estructuras óseas de gran tamaño.</p>
      <p>La morfología no coincide con ninguna especie catalogada.</p>
      <p>Las proporciones sugieren organismos de escala anómala.</p>`,
              der: `<p>No se han encontrado esqueletos completos.</p>
      <p>Los restos aparecen fragmentados e integrados al terreno congelado.</p>
      <p>Esto indica que el proceso de congelación ocurrió mientras la entidad aún estaba presente.</p>
      <p>No hay indicios de descomposición previa.</p>`,
            },
            {
              izq: `<h2>Registro Histórico</h2>
      <p>Textos fragmentados mencionan una entidad bajo el nombre “Fafnir”.</p>
      <p>No está claro si se trata de un individuo único o de una categoría de organismos.</p>
      <p>Las descripciones coinciden en un punto: su presencia altera el entorno de forma directa.</p>`,
              der: `<p>No se describen métodos de ataque convencionales.</p>
      <p>El efecto asociado es ambiental, no conductual.</p>
      <p>Esto diferencia a Fafnir de otras criaturas documentadas.</p>
      <p>No actúa sobre el entorno. Lo redefine.</p>`,
            },
            {
              izq: `<h2>Relación Causal</h2>
      <p>La evidencia sugiere una relación directa entre la entidad y el evento glacial.</p>
      <p>El frío no es una condición externa.</p>
      <p>Es una consecuencia de la presencia de la criatura.</p>`,
              der: `<p>Esto invierte el modelo tradicional de análisis.</p>
      <p>No es el organismo el que se adapta al clima.</p>
      <p>El clima se genera a partir del organismo.</p>
      <p>La criatura funciona como origen del fenómeno.</p>`,
            },
            {
              izq: `<h2>Comparación</h2>
      <p>He encontrado patrones similares en otros registros, particularmente en Zelenograd.</p>
      <p>En ambos casos, el entorno pierde coherencia térmica y biológica.</p>`,
              der: `<p>Esto sugiere que Fafnir no es un caso aislado.</p>
      <p>Podría formar parte de un conjunto de entidades con capacidad de alterar condiciones fundamentales.</p>
      <p>No habitan el entorno.</p>
      <p>Lo imponen.</p>`,
            },
            {
              izq: `<h2>Hipótesis</h2>
      <p>Fafnir no generó el evento como acción deliberada.</p>
      <p>El evento es una consecuencia inherente a su existencia.</p>
      <p>La criatura no produce frío. Es frío.</p>`,
              der: `<p>Si esto es correcto, entonces su presencia implica inestabilidad permanente.</p>
      <p>No puede coexistir con sistemas biológicos convencionales.</p>
      <p>La única forma de equilibrio sería su ausencia.</p>
      <p>O la adaptación total del entorno.</p>`,
            },
            {
              izq: `<h2>Estado Actual</h2>
      <p>No se han registrado avistamientos recientes de la entidad.</p>
      <p>Los restos permanecen como única evidencia física.</p>
      <p>No hay indicios de desplazamiento.</p>`,
              der: `<p>Esto plantea dos posibilidades:</p>
      <p>La criatura dejó de existir durante el evento.</p>
      <p>O el evento fue su forma de transición.</p>
      <p>No dispongo de datos suficientes para determinar cuál.</p>`,
            },
            {
              izq: `<h2>Nota Personal</h2>
      <p>He comparado los patrones de Fafnir con los del bosque oriental.</p>
      <p>La diferencia es clara, pero la lógica subyacente parece similar.</p>`,
              der: `<p>Ambos casos sugieren lo mismo:</p>
      <p>Estas entidades no interactúan con el mundo bajo nuestras reglas.</p>
      <p>Si aparecen, el entorno cambia.</p>
      <p>No sé si eso es un efecto… o su propósito.</p>`,
            },
          ],
        },

        // --- ECONOMÍAS ---
        {
          titulo: "Observación del Investigador: Economías de Frontera",
          paginas: [
            {
              izq: `
        <h2>Stormgarde</h2>
        <p>
          Ciudad fortificada orientada a la autosuficiencia y la resistencia.
          Su economía se centra en la producción militar, el refinamiento de metales
          y la fabricación de herramientas de defensa.
        </p>
      `,
              der: `
        <h2>Allashar</h2>
        <p>
          A diferencia de Stormgarde, Allashar no invierte sus recursos en la defensa,
          sino en el conocimiento. Su economía se especializa en investigación,
          educación y desarrollo de técnicas avanzadas de agricultura y alquimia.
        </p>
      `,
            },
            {
              izq: `
        <h2>Relación Comercial</h2>
        <p>
          A pesar de su proximidad geográfica, ambas regiones han desarrollado
          economías complementarias en lugar de competitivas.
        </p>
      `,
              der: `
        <p>
          Stormgarde exporta protección, armamento y materiales reforzados,
          mientras que Allashar provee conocimientos, medicinas y mejoras
          en eficiencia productiva.
        </p>
      `,
            },
            {
              izq: `
        <h2>Conclusión del Investigador</h2>
        <p>
          La cercanía entre ambas naciones no ha generado conflicto económico,
          sino una interdependencia estructural. Su comercio mutuo ha permitido
          estabilidad regional, donde cada una compensa las carencias de la otra.
        </p>
      `,
              der: `
        <p>
          Este patrón sugiere que la especialización forzada por condiciones
          geográficas y culturales puede derivar en sistemas de cooperación
          más estables que la autosuficiencia aislada.
        </p>
      `,
            },
          ],
        },

        // --- HASTAHAR ---
        {
          titulo: "Hastahar: Adaptación vs Dominio",
          paginas: [
            {
              izq: `<h2>Origen Nómada</h2>
      <p>Los primeros registros de Hastahar no describen una nación, sino una serie de grupos dispersos sin territorio fijo.</p>
      <p>Su desplazamiento constante no respondía únicamente a la búsqueda de recursos, sino a la evasión de zonas inestables.</p>
      <p>Estos grupos no intentaban comprender las anomalías. Las evitaban.</p>`,
              der: `<p>Sin embargo, esta estrategia resultó insostenible.</p>
      <p>La expansión progresiva de los fenómenos anómalos redujo los espacios seguros.</p>
      <p>El nomadismo dejó de ser una opción viable.</p>
      <p>El cambio de comportamiento no fue cultural. Fue forzado.</p>`,
            },
            {
              izq: `<h2>Primer Contacto</h2>
      <p>Los registros más antiguos de interacción con criaturas no humanas muestran un patrón consistente: ausencia de enfrentamiento directo.</p>
      <p>En lugar de combatir, los grupos comenzaron a observar.</p>
      <p>Identificaron rutas, ciclos de actividad y respuestas a estímulos.</p>`,
              der: `<p>Este proceso derivó en una conclusión clave: muchas de estas entidades no operan bajo lógica agresiva constante.</p>
      <p>Responden a condiciones específicas.</p>
      <p>El conflicto no era inevitable. Era situacional.</p>
      <p>Esto permitió los primeros intentos de aproximación controlada.</p>`,
            },
            {
              izq: `<h2>Domesticación Parcial</h2>
      <p>El término “domesticación” es impreciso en este contexto.</p>
      <p>No existe control absoluto sobre las criaturas.</p>
      <p>Lo que se ha logrado es una forma de coexistencia funcional.</p>`,
              der: `<p>Las bestias responden a patrones repetidos, no a autoridad.</p>
      <p>Reconocen presencia, no jerarquía.</p>
      <p>Esto sugiere que la relación no es de dominio, sino de adaptación mutua.</p>
      <p>Ambas partes modifican su comportamiento.</p>`,
            },
            {
              izq: `<h2>Formación del Territorio</h2>
      <p>La estabilización de estas interacciones permitió la reducción del desplazamiento.</p>
      <p>Los grupos comenzaron a establecer asentamientos en zonas previamente evitadas.</p>
      <p>La presencia de criaturas dejó de ser un factor de expulsión.</p>`,
              der: `<p>Esto marcó el inicio de Hastahar como estructura territorial.</p>
      <p>No se fundó mediante conquista ni expansión militar.</p>
      <p>Se consolidó a través de adaptación progresiva al entorno.</p>
      <p>El territorio no fue tomado. Fue aceptado.</p>`,

      const ayuda = document.getElementById("ayuda");
      const contenidoLibro = document.getElementById("contenidoLibro");
      const indicador = document.getElementById("indicador");

      let libroSeleccionado = 0;
      let paginaActual = 0;

      function renderizarLibro() {
        const libro = librosLore[libroSeleccionado];
        const pagina = libro.paginas[paginaActual];

        contenidoLibro.innerHTML = `
          <div class="pagina-izquierda">
            <h1>${libro.titulo}</h1>
            ${pagina.izq}
          </div>
          <div class="pagina-derecha">
            ${pagina.der}
          </div>
        `;

        indicador.textContent = `${paginaActual + 1} / ${libro.paginas.length}`;
      }

      /* abrir */
      document.querySelectorAll(".zona").forEach((zona) => {
        zona.addEventListener("click", () => {
          libroSeleccionado = parseInt(zona.dataset.id);
          paginaActual = 0;

          ayuda.classList.add("activo");
          document.body.classList.add("sin-scroll");

          renderizarLibro();
        });
      });

      /* navegación */
      document.getElementById("btnAnterior").onclick = () => {
        if (paginaActual > 0) {
          paginaActual--;
          renderizarLibro();
        }
      };

      document.getElementById("btnSiguiente").onclick = () => {
        const libro = librosLore[libroSeleccionado];
        if (paginaActual < libro.paginas.length - 1) {
          paginaActual++;
          renderizarLibro();
        }
      };

      /* cerrar */
      document.getElementById("btnCerrarAyuda").onclick = () => {
        ayuda.classList.remove("activo");
        document.body.classList.remove("sin-scroll");
      };

      /* seguridad */
      window.addEventListener("DOMContentLoaded", () => {
        ayuda.classList.remove("activo");
        document.body.classList.remove("sin-scroll");
      });
